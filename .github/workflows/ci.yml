name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # apps/web (fork del plugin) se integra al pipeline en F1.
      - name: Lint + typecheck + build + tests
        run: >
          pnpm turbo run lint typecheck build test
          --filter=@imagina-crm/shared
          --filter=@imagina-crm/api
