name: Release

# Empaqueta un bundle autocontenido (API compilado + node_modules de prod +
# SPA build + migraciones + scripts) y lo publica como asset de un GitHub
# Release, con su .sha256. La app lo detecta y lo instala sola (ADR-S13).
#
# Se dispara: (a) al mergear a main → publica la versión de ./VERSION si NO
# existe todavía (así un commit común no re-releasa); (b) al taggear vX.Y.Z;
# (c) a mano por workflow_dispatch con un input de versión.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del release, ej. v1.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.d.outputs.go }}
      ref: ${{ steps.d.outputs.ref }}
      version: ${{ steps.d.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            REF="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            REF="${{ github.ref_name }}"
          else
            REF="v$(cat VERSION)"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          GO=true
          # En push a main sólo publicamos si esa versión aún no existe.
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            if gh release view "${REF}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then GO=false; fi
          fi
          echo "go=${GO}" >> "$GITHUB_OUTPUT"
          echo "→ release ${REF} · publicar=${GO}"

  build:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Habilitar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Build (shared → api → web)
        run: |
          pnpm --filter @imagina-base/shared build
          pnpm --filter @imagina-base/api build
          pnpm --filter @imagina-base/web build:cloud

      - name: Armar bundle autocontenido
        run: |
          set -euo pipefail
          VERSION="${{ needs.gate.outputs.version }}"
          OUT=bundle
          rm -rf "$OUT" dist-release && mkdir -p "$OUT/apps" "$OUT/deploy" dist-release

          # node_modules de producción COMPLETO y autocontenido. Usamos el deploy
          # no-legacy con inject-workspace-packages (resuelve @imagina-base/shared
          # y TODAS las deps transitivas, ej. fastify-plugin). El --legacy dejaba
          # el árbol incompleto.
          pnpm --filter @imagina-base/api deploy --prod --config.inject-workspace-packages=true "$OUT/apps/api"
          # el build (dist) está gitignored → pnpm deploy no lo copia; lo agregamos
          cp -r apps/api/dist "$OUT/apps/api/dist"

          # SPA (cloud + portal + assets)
          cp -r apps/web/dist-cloud "$OUT/web"

          # scripts + config que el release necesita para instalar/rollback/servir
          cp deploy/deploy.sh deploy/finalize.sh "$OUT/deploy/"
          cp scripts/backup.sh scripts/restore.sh "$OUT/deploy/"
          cp deploy/docker-compose.prod.yml deploy/.env.production.example \
             deploy/nginx.conf deploy/imagina-api.service "$OUT/deploy/"
          chmod +x "$OUT"/deploy/*.sh

          # versión exacta que reportará el server
          echo "$VERSION" > "$OUT/VERSION"

          # zip -y: preserva los symlinks del store .pnpm (son relativos), si no
          # el node_modules se rompe al extraer.
          ZIP="dist-release/imagina-base-${VERSION}.zip"
          ( cd "$OUT" && zip -qry "../$ZIP" . )
          sha256sum "$ZIP" | awk '{print $1}' > "${ZIP}.sha256"
          ls -lh dist-release

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.ref }}
          files: |
            dist-release/*.zip
            dist-release/*.zip.sha256
