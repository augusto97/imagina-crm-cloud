# Nginx vhost de producción — Imagina Base (alternativa a Caddy, p.ej. paneles
# como ServerAvatar/RunCloud que usan Nginx). Un origen sirve los dos SPA y
# proxya el API + WebSocket al backend Node. Mismo origen → sin CORS.
#
# En ServerAvatar: creá la app como SITIO ESTÁTICO con document root
# /opt/imagina-base/current/web, dejá que el panel emita el SSL (Let's Encrypt),
# y pegá los `location` de abajo en "Nginx Config" de la app (el panel ya pone
# el server{}, listen 443 ssl y server_name). Si editás el vhost a mano, usá
# este bloque completo reemplazando el dominio y las rutas de los certificados.

server {
    listen 443 ssl http2;
    server_name app.tu-dominio.com;

    # SSL: lo gestiona ServerAvatar/Let's Encrypt (o completá a mano).
    # ssl_certificate     /etc/letsencrypt/live/app.tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.tu-dominio.com/privkey.pem;

    root /opt/imagina-base/current/web;   # symlink `current` (releases atómicos)
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    client_max_body_size 25m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- API REST + webhooks de pago ---
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket del realtime (Socket.io) ---
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Assets del SPA (ambos builds referencian /assets/*) ---
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # --- Portal del cliente (build separado) → fallback SPA ---
    location /portal {
        try_files $uri /cloud-portal/index.html;
    }

    # --- Resto (/, /lists, /settings, …) → shell cloud ---
    location / {
        try_files $uri /cloud/index.html;
    }
}

# Redirección 80 → 443 (ServerAvatar suele agregarla solo).
server {
    listen 80;
    server_name app.tu-dominio.com;
    return 301 https://$host$request_uri;
}
